<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>OLED BLE Draw</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --blue:     #00c8ff;
    --dim:      #00607a;
    --bg:       #04090f;
    --surface: #080f18;
    --border:  #0d2030;
    --glow:    0 0 14px #00c8ff55;
  }
  body {
    background: var(--bg);
    font-family: 'Share Tech Mono', monospace;
    color: var(--blue);
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100dvh;
    padding: 18px 12px 24px;
    gap: 16px;
    background-image: radial-gradient(ellipse 70% 35% at 50% -5%, #00c8ff1a 0%, transparent 70%);
  }
  h1 { font-size: 1.25rem; letter-spacing: .22em; text-transform: uppercase; text-shadow: var(--glow); }
  .sub { font-size: .58rem; color: var(--dim); letter-spacing: .14em; text-align: center; margin-top: 2px; }
  .oled-wrap { background: #000; border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px 6px; box-shadow: var(--glow); }
  .oled-label { font-size: .52rem; letter-spacing: .16em; color: var(--dim); text-align: center; margin-bottom: 5px; text-transform: uppercase; }
  #preview { display: block; width: 256px; height: 128px; background: #000; image-rendering: pixelated; border: 1px solid #0a1e2e; border-radius: 3px; }
  .canvas-wrap { border: 1px solid var(--border); border-radius: 8px; background: #000; box-shadow: var(--glow); line-height: 0; touch-action: none; cursor: crosshair; overflow: hidden; }
  #canvas { display: block; touch-action: none; border-radius: 7px; width: 320px; height: 160px; }
  .controls { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; justify-content: center; }
  .ctrl-label { font-size: .65rem; color: var(--dim); letter-spacing: .1em; display: flex; align-items: center; gap: 7px; }
  input[type=range] { -webkit-appearance: none; width: 80px; height: 3px; border-radius: 2px; background: var(--border); outline: none; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 13px; height: 13px; border-radius: 50%; background: var(--blue); box-shadow: 0 0 7px var(--blue); cursor: pointer; }
  .btn { background: transparent; border: 1px solid var(--dim); color: var(--blue); font-family: inherit; font-size: .65rem; letter-spacing: .12em; padding: 7px 16px; border-radius: 5px; cursor: pointer; text-transform: uppercase; transition: background .12s; }
  .btn:active { background: var(--blue); color: #000; box-shadow: var(--glow); }
  #status { font-size: .58rem; letter-spacing: .12em; padding: 4px 10px; border-radius: 99px; border: 1px solid var(--border); color: var(--dim); }
  #status.ok  { color: #00ffaa; border-color: #00ffaa44; box-shadow: 0 0 8px #00ffaa44; }
  #status.err { color: #ff4455; border-color: #ff445544; }
</style>
</head>
<body>

<div>
  <h1>■ OLED BLE DRAW</h1>
  <p class="sub">SH1106 · Bluetooth Low Energy edition</p>
</div>

<div class="oled-wrap">
  <div class="oled-label">Live OLED Preview</div>
  <canvas id="preview" width="128" height="64"></canvas>
</div>

<div class="canvas-wrap">
  <canvas id="canvas" width="320" height="160"></canvas>
</div>

<div class="controls">
  <button class="btn" onclick="connectBLE()">⚡ CONNECT TO OLED</button>
  <label class="ctrl-label">
    BRUSH <input type="range" id="brush" min="2" max="22" value="8">
  </label>
  <button class="btn" onclick="clearAll()">✕ CLEAR</button>
  <span id="status">DISCONNECTED</span>
</div>

<script>
const C = document.getElementById('canvas');
const ctx = C.getContext('2d');
ctx.fillStyle = '#000'; ctx.fillRect(0, 0, C.width, C.height);
ctx.lineCap = ctx.lineJoin = 'round';

const P = document.getElementById('preview');
const pctx = P.getContext('2d');
pctx.fillStyle = '#000'; pctx.fillRect(0, 0, 128, 64);

const brushEl = document.getElementById('brush');
const statusEl = document.getElementById('status');

/* ── Web Bluetooth Config ─────────────────────── */
const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
const CHARACTERISTIC_UUID_RX = "beb5483e-36e1-4688-b7f5-ea07361b26a8";
let rxCharacteristic = null;
let bleDevice = null;

async function connectBLE() {
  try {
    setStatus('SEARCHING...', 'err');
    bleDevice = await navigator.bluetooth.requestDevice({
      filters: [{ name: 'OLED-Draw-BLE' }],
      optionalServices: [SERVICE_UUID]
    });
    
    setStatus('CONNECTING...', 'err');
    const server = await bleDevice.gatt.connect();
    const service = await server.getPrimaryService(SERVICE_UUID);
    rxCharacteristic = await service.getCharacteristic(CHARACTERISTIC_UUID_RX);
    
    setStatus('CONNECTED', 'ok');
    bleDevice.addEventListener('gattserverdisconnected', () => {
      setStatus('DISCONNECTED', 'err');
      rxCharacteristic = null;
    });
  } catch (error) {
    console.log(error);
    setStatus('FAILED', 'err');
  }
}

function send(m) {
  if (!rxCharacteristic) return;
  const encoder = new TextEncoder();
  // Using writeValueWithResponse ensures data isn't dropped over Bluetooth buffers
  rxCharacteristic.writeValueWithResponse(encoder.encode(m)).catch(e => console.log(e));
}

/* ── Drawing Logics ───────────────────────────── */
let drawing = false, lx = 0, ly = 0;
function brush() { return +brushEl.value; }

function pt(e) {
  const r = C.getBoundingClientRect();
  const src = e.touches ? e.touches[0] : e;
  return {
    x: Math.round((src.clientX - r.left) * C.width  / r.width),
    y: Math.round((src.clientY - r.top)  * C.height / r.height)
  };
}

function strokeTo(x0, y0, x1, y1, sz) {
  ctx.beginPath(); ctx.moveTo(x0, y0); ctx.lineTo(x1, y1);
  ctx.strokeStyle = '#00c8ff'; ctx.lineWidth = sz; ctx.stroke();

  const px0 = x0 * 128 / 320, py0 = y0 * 64 / 160;
  const px1 = x1 * 128 / 320, py1 = y1 * 64 / 160;
  pctx.beginPath(); pctx.moveTo(px0, py0); pctx.lineTo(px1, py1);
  pctx.strokeStyle = '#00c8ff'; pctx.lineWidth = Math.max(1, sz * 128 / 320);
  pctx.lineCap = pctx.lineJoin = 'round'; pctx.stroke();

  send(`L ${x0} ${y0} ${x1} ${y1} ${sz}`);
}

function onStart(e) { e.preventDefault(); drawing = true; const p = pt(e); lx = p.x; ly = p.y; strokeTo(lx, ly, lx, ly, brush()); }
function onMove(e) { if (!drawing) return; e.preventDefault(); const p = pt(e); strokeTo(lx, ly, p.x, p.y, brush()); lx = p.x; ly = p.y; }
function onEnd() { drawing = false; }

C.addEventListener('mousedown',  onStart);   C.addEventListener('mousemove',  onMove);
C.addEventListener('mouseup',    onEnd);     C.addEventListener('mouseleave', onEnd);
C.addEventListener('touchstart', onStart, { passive: false });
C.addEventListener('touchmove',  onMove,  { passive: false });
C.addEventListener('touchend',   onEnd);

function clearAll() {
  ctx.fillStyle = '#000'; ctx.fillRect(0, 0, C.width, C.height);
  pctx.fillStyle = '#000'; pctx.fillRect(0, 0, 128, 64);
  send('CLEAR');
}

function setStatus(t, c) { statusEl.textContent = t; statusEl.className = c || ''; }
</script>
</body>
</html>
